# Deploys the receipt-handler function into kijani-staging.
# Apply: kubectl apply -f serverless/receipt-handler/k8s-manifest.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: receipt-handler
    namespace: kijani-staging
    labels:
        app: receipt-handler
spec:
    replicas: 1
    selector:
        matchLabels:
            app: receipt-handler
    template:
        metadata:
            labels:
                app: receipt-handler
        spec:
            terminationGracePeriodSeconds: 10
            containers:
                - name: receipt-handler
                  image: erickmosedev/receipt-handler:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 3000
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      failureThreshold: 6
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '192Mi'
                      limits:
                          cpu: '200m'
                          memory: '384Mi'
---
apiVersion: v1
kind: Service
metadata:
    name: receipt-handler
    namespace: kijani-staging
    labels:
        app: receipt-handler
spec:
    selector:
        app: receipt-handler
    ports:
        - name: http
          protocol: TCP
          port: 3000
          targetPort: 3000
