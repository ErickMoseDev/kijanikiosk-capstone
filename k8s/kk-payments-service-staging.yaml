apiVersion: v1
kind: Service
metadata:
    name: kk-payments
    namespace: kijani-staging
    labels:
        app: kk-payments
        environment: staging
spec:
    type: NodePort
    selector:
        app: kk-payments
    ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 3000
          nodePort: 30001
